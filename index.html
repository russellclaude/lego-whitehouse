<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lego White House</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #87CEEB; font-family: 'Segoe UI', sans-serif; }
    canvas { display: block; }

    #ui {
      position: absolute;
      top: 14px;
      left: 14px;
      color: #fff;
      text-shadow: 0 1px 4px rgba(0,0,0,0.7);
      pointer-events: none;
      user-select: none;
    }
    #ui h1 { font-size: 20px; font-weight: 700; letter-spacing: 0.5px; }
    #ui p  { font-size: 12px; margin-top: 5px; opacity: 0.85; }

    #stats {
      position: absolute;
      bottom: 14px;
      left: 14px;
      font-size: 11px;
      color: rgba(255,255,255,0.7);
      text-shadow: 0 1px 3px rgba(0,0,0,0.6);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="ui">
    <h1>Lego White House</h1>
    <p>Drag · Scroll to zoom · Right-click to pan</p>
  </div>
  <div id="stats"></div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="main.js"></script>
</body>
</html>
